<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social-links-profile-main</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="pbox">  
                <img class="ppfoto" src="social-links-profile-main/assets/images/avatar-jessica.jpeg" alt="Profile Picture">
                
                <h1 class="tprofile">Jessica Randall</h1>
                
                <h2 class="dtprofile">London, United Kingdom</h2>
                
                <p class="descriptionprofile">Front-end developer and avid reader.</p>
        
            <div class="sectionbuttons">
                <button class="boxoptions">
                    <p class="boxoptiondesc">GitHub</p>
                </button>
                <button class="boxoptions">
                    <p class="boxoptiondesc">Frontend Mentor</p>
                </button>
                <button class="boxoptions">
                    <p class="boxoptiondesc">LinkedIn</p>
                </button>
                <button class="boxoptions">
                    <p class="boxoptiondesc">Twitter</p>
                </button>
                <button class="boxoptions">
                    <p class="boxoptiondesc">Instagram</p>
                </button>
            </div>
            
    </div>
      
</body>
</html>
